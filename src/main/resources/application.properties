# Aiven MySQL with required SSL, timezone, and allowPublicKeyRetrieval for cloud deployments
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:kartik}?useSSL=true&requireSSL=true&sslMode=REQUIRED&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:password}

# Use MySQL8Dialect explicitly to avoid Hibernate auto-detection failures on Render
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Disable SQL logging and set schema update mode
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# HikariCP connection pool tuned for Render free tier (max 5 connections)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# Server port from environment or default to 8080
server.port=${PORT:8080}

# Actuator health endpoint for Render
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never