# ── Aiven MySQL ───────────────────────────────────────────────────────────────
# sslMode=REQUIRED is sufficient for mysql-connector-j 8+ (requireSSL is legacy)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:kartik}?sslMode=REQUIRED&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hibernate / JPA ───────────────────────────────────────────────────────────
# MySQLDialect is correct for Hibernate 6+ / 7.x (MySQL8Dialect was removed)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ── HikariCP — tuned for Render free tier + Aiven connection limits ───────────
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1


server.port=${PORT:8080}

# ── Actuator — health check endpoint for Render ───────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never